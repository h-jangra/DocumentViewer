<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f5f5f7;
      --panel-bg: rgba(255, 255, 255, 0.8);
      --border-color: rgba(0, 0, 0, 0.08);
      --text-main: #1d1d1f;
      --text-muted: #86868b;
      --accent-color: #0071e3;
      --accent-hover: #0077ed;
      --toolbar-height: 56px;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-mono: 'JetBrains Mono', 'Courier New', Courier, monospace;
      --font-serif: 'Lora', Georgia, serif;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.03);
    }
    [data-theme="dark"] {
      --bg-color: #121212;
      --panel-bg: rgba(30, 30, 30, 0.85);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f5f5f7;
      --text-muted: #86868b;
      --accent-color: #2997ff;
      --accent-hover: #47a6ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; font-family: var(--font-sans); background: var(--bg-color); color: var(--text-main); overflow: hidden; transition: background-color 0.2s, color 0.2s; }
    
    .toolbar {
      height: var(--toolbar-height);
      background: var(--panel-bg);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: relative;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }
    .toolbar-left, .toolbar-right, .toolbar-center { display: flex; align-items: center; gap: 12px; }
    .toolbar-center { flex: 1; justify-content: center; }
    .toolbar-divider { width: 1px; height: 20px; background: var(--border-color); margin: 0 4px; }
    
    .file-info { display: flex; align-items: center; gap: 10px; }
    .file-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 320px; }
    
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 36px;
      padding: 0 16px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--panel-bg);
      color: var(--text-main);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      gap: 6px;
      text-decoration: none;
    }
    .btn:hover { background: var(--border-color); }
    .btn-primary { background: var(--accent-color); color: white; border-color: transparent; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-icon { width: 36px; padding: 0; }
    
    .viewer-container { height: calc(100% - var(--toolbar-height)); width: 100%; overflow: auto; position: relative; }
    
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1d1d1f;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 1000;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    [data-theme="dark"] .toast { background: #f5f5f7; color: #121212; }

    /* DOCX styles */
    .docx-wrapper { display: flex; justify-content: center; padding: 40px 20px; }
    .docx-page {
      background: var(--panel-bg);
      max-width: 850px;
      width: 100%;
      padding: 60px 80px;
      border-radius: 12px;
      box-shadow: var(--shadow-lg);
      font-family: var(--font-serif);
      font-size: 16px;
      line-height: 1.65;
      color: var(--text-main);
      border: 1px solid var(--border-color);
      word-wrap: break-word;
    }
    .docx-page h1, .docx-page h2, .docx-page h3 { font-family: var(--font-sans); margin-top: 1.5em; margin-bottom: 0.5em; line-height: 1.25; }
    .docx-page p { margin-bottom: 1.2em; }
    .docx-page table { width: 100%; border-collapse: collapse; margin: 24px 0; }
    .docx-page td, .docx-page th { border: 1px solid var(--border-color); padding: 10px 14px; }

    /* XLSX / CSV styles */
    .xlsx-wrapper { height: 100%; display: flex; flex-direction: column; }
    .xlsx-tabs { display: flex; background: var(--panel-bg); border-bottom: 1px solid var(--border-color); padding: 8px 16px 0 16px; gap: 6px; overflow-x: auto; }
    .xlsx-tab { padding: 8px 16px; border: 1px solid transparent; border-bottom: none; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-muted); transition: all 0.2s; white-space: nowrap; }
    .xlsx-tab:hover { color: var(--text-main); background: var(--border-color); }
    .xlsx-tab.active { color: var(--accent-color); background: var(--bg-color); border-color: var(--border-color); border-bottom-color: var(--bg-color); font-weight: 600; }
    .xlsx-table-container { flex: 1; overflow: auto; padding: 24px; }
    .xlsx-table { border-collapse: collapse; background: var(--panel-bg); border-radius: 8px; box-shadow: var(--shadow-sm); font-size: 13px; min-width: 100%; border: 1px solid var(--border-color); }
    .xlsx-table th { background: var(--border-color); font-weight: 600; text-align: left; position: sticky; top: 0; z-index: 10; color: var(--text-main); }
    .xlsx-table td, .xlsx-table th { border: 1px solid var(--border-color); padding: 10px 14px; min-width: 120px; max-width: 300px; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
    .xlsx-table tr:hover { background: var(--border-color); }

    /* PPTX styles */
    .pptx-wrapper { display: flex; height: 100%; width: 100%; }
    .pptx-sidebar { width: 240px; border-right: 1px solid var(--border-color); background: var(--panel-bg); overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .pptx-slide-thumb { padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); cursor: pointer; font-size: 12px; transition: all 0.2s; background: var(--bg-color); display: flex; flex-direction: column; gap: 4px; }
    .pptx-slide-thumb:hover { border-color: var(--text-muted); }
    .pptx-slide-thumb.active { border-color: var(--accent-color); background: rgba(0, 113, 227, 0.08); box-shadow: var(--shadow-sm); }
    .pptx-slide-number { font-weight: 700; color: var(--accent-color); font-size: 11px; }
    .pptx-slide-preview-text { color: var(--text-muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .pptx-main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; background: var(--bg-color); overflow-y: auto; }
    .pptx-slide-container { width: 100%; max-width: 850px; aspect-ratio: 16/9; background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: var(--shadow-lg); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 60px; position: relative; overflow: hidden; }
    .pptx-slide-inner { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .pptx-slide-content { font-size: 22px; line-height: 1.6; text-align: center; font-weight: 500; max-height: 100%; overflow-y: auto; color: var(--text-main); width: 100%; }
    .pptx-slide-content h3 { font-size: 32px; margin-bottom: 24px; color: var(--accent-color); font-weight: 700; font-family: var(--font-sans); }
    .pptx-slide-content p { max-width: 700px; margin: 0 auto; }
    .pptx-slide-footer { position: absolute; bottom: 20px; left: 40px; right: 40px; display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); border-top: 1px solid var(--border-color); padding-top: 10px; }
    
    #pptx-slide-container:fullscreen {
      max-width: 100% !important;
      aspect-ratio: auto !important;
      width: 100vw !important;
      height: 100vh !important;
      border-radius: 0 !important;
      border: none !important;
      padding: 80px !important;
      background: #000 !important;
    }
    #pptx-slide-container:fullscreen .pptx-slide-content { color: #fff !important; }
    #pptx-slide-container:fullscreen .pptx-slide-content h3 { color: #2997ff !important; }
    #pptx-slide-container:fullscreen .pptx-slide-footer { color: #86868b !important; }

    /* TXT styles */
    .txt-container { display: flex; height: 100%; background: var(--bg-color); }
    .txt-line-numbers { padding: 20px 16px; text-align: right; color: var(--text-muted); font-family: var(--font-mono); font-size: 13px; line-height: 1.6; user-select: none; border-right: 1px solid var(--border-color); background: var(--panel-bg); }
    .txt-content-wrapper { flex: 1; overflow: auto; }
    .txt-pre { padding: 20px; margin: 0; font-family: var(--font-mono); font-size: 13px; line-height: 1.6; color: var(--text-main); tab-size: 4; outline: none; }
    .txt-pre.wrap { white-space: pre-wrap; word-wrap: break-word; }
    .txt-pre.nowrap { white-space: pre; word-wrap: normal; }
    .search-highlight { background: rgba(255, 235, 59, 0.45); color: black; border-radius: 2px; box-shadow: 0 0 0 1px rgba(255, 235, 59, 0.6); }
    
    .search-box { display: flex; align-items: center; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 8px; padding: 0 12px; gap: 8px; height: 36px; }
    .search-box input { border: none; background: transparent; color: var(--text-main); outline: none; font-size: 13px; width: 140px; }
    .search-box input::placeholder { color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar-left">
      <span class="file-info" id="file-info-container">
        <!-- Dynamic file icon and name injected here -->
      </span>
    </div>
    
    <div class="toolbar-center" id="toolbar-center-container">
      <!-- Format specific controls injected here -->
    </div>
    
    <div class="toolbar-right">
      <button id="theme-toggle-btn" class="btn btn-icon" title="Toggle Theme"></button>
      <a href="#" id="download-link" class="btn btn-primary">
        Download
      </a>
    </div>
  </div>
  
  <div class="viewer-container" id="viewer-content-container">
    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text-muted);">
      Loading document content...
    </div>
  </div>

  <div id="toast" class="toast"></div>
  
  <script src="viewer.js"></script>
</body>
</html>
